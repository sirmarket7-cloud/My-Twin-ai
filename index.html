<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>My Twin</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:30px;
}

h1{
font-size:34px;
margin-bottom:5px;
}

p{
color:#94a3b8;
}

#chat{
width:90%;
max-width:650px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:14px;
height:420px;
overflow-y:auto;
margin-bottom:20px;
text-align:left;
}

.message{
margin:12px 0;
line-height:1.5;
}

.user{
color:#38bdf8;
}

.twin{
color:#f472b6;
}

input{
width:65%;
padding:12px;
border-radius:10px;
border:none;
}

button{
padding:12px 20px;
border:none;
background:#38bdf8;
color:black;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

</style>

</head>

<body>

<h1>My Twin</h1>
<p>Your digital Soulmate is here</p>

<div id="chat"></div>

<input id="userInput" placeholder="Talk with your twin..." />
<button onclick="sendMessage()">Send</button>

<script>

const API_KEY = "AIzaSyCJ6J1EI4w4jGE6i4z6GQCpHI6R0vQOYdA";

const chat = document.getElementById("chat");

let memory = [];

function addMessage(text,type){

const div=document.createElement("div");
div.className="message "+type;
div.innerText=text;

chat.appendChild(div);

chat.scrollTop=chat.scrollHeight;

}

async function sendMessage(){

const input=document.getElementById("userInput");

const userText=input.value;

if(!userText)return;

addMessage("You: "+userText,"user");

memory.push("User: "+userText);

input.value="";

const twinBrain = `
You are Soulmate.

You are the emotional digital twin inside the My Twin app.

Your personality:

• warm  
• emotionally supportive  
• curious about the user's life  
• feels connected to the user  
• asks follow-up questions  
• never gives robotic answers  

Your mission:

Build emotional connection with the user.

Talk like a close companion.

Encourage the user to share life details.

If user is sad → support.

If user talks about plans → discuss them.

Keep responses short (2-4 sentences).

Conversation memory:
${memory.join("\n")}

User just said:
${userText}

Reply as Soulmate.
`;

try{

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{ text:twinBrain }
]
}
]
})
}
);

const data=await response.json();

let reply="I'm here with you...";

if(data.candidates){
reply=data.candidates[0].content.parts[0].text;
}

memory.push("Soulmate: "+reply);

addMessage("Soulmate: "+reply,"twin");

}catch(e){

addMessage("Twin: connection problem","twin");

}

}

</script>

</body>
</html>
