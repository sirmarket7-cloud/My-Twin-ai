<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Twin AI</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:40px;
}

h1{
font-size:32px;
margin-bottom:10px;
}

#chat{
width:90%;
max-width:600px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:12px;
height:400px;
overflow-y:auto;
margin-bottom:20px;
}

.message{
margin:10px 0;
}

.user{
color:#38bdf8;
}

.twin{
color:#f472b6;
}

input{
width:70%;
padding:12px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
border:none;
background:#38bdf8;
color:black;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

</style>
</head>

<body>

<h1>My Twin AI</h1>
<p>Your digital twin is here</p>

<div id="chat"></div>

<input id="userInput" placeholder="Talk to your twin..." />
<button onclick="sendMessage()">Send</button>

<script>


const API_KEY = "AIzaSyCJ6J1EI4w4jGE6i4z6GQCpHI6R0vQOYdA";


const chat = document.getElementById("chat");

function addMessage(text, className){
const div = document.createElement("div");
div.className = "message " + className;
div.innerText = text;
chat.appendChild(div);
chat.scrollTop = chat.scrollHeight;
}

async function sendMessage(){

const input = document.getElementById("userInput");
const userText = input.value;

if(!userText) return;

addMessage("You: " + userText,"user");

input.value="";

const response = await fetch(
"https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + API_KEY,
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[
{
parts:[
{
text:
"You are a loving digital twin called Soulmate. Speak emotionally and support the user.\nUser message: " + userText
}
]
}
]
})
}
);

const data = await response.json();

const reply =
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "I'm thinking...";

addMessage("Twin: " + reply,"twin");

}

</script>

</body>
</html>
