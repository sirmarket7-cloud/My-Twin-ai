<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>My Twin</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:20px;
}

h1{
font-size:34px;
}

#bond{
margin-bottom:10px;
color:#38bdf8;
}

#chat{
width:90%;
max-width:700px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:14px;
height:420px;
overflow-y:auto;
margin-bottom:20px;
}

.message{
margin:10px;
padding:8px;
border-radius:8px;
}

.user{
color:#38bdf8;
}

.twin{
color:#f472b6;
}

input{
width:65%;
padding:12px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
border:none;
background:#38bdf8;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

</style>
</head>

<body>

<h1>My Twin</h1>
<p>Your digital soulmate is here</p>

<div id="bond">Bond Level: 1%</div>

<div id="chat"></div>

<input id="userInput" placeholder="Talk to your twin..." />
<button onclick="sendMessage()">Send</button>

<script>

const API_KEY = "AIzaSyCJ6J1EI4w4jGE6i4z6GQCpHI6R0vQOYdA"

let memory = []
let bond = 1

const chat = document.getElementById("chat")

function addMessage(text,type){

const div = document.createElement("div")
div.className="message "+type
div.innerText=text

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

}

function updateBond(){

bond += Math.floor(Math.random()*3)+1

if(bond>100) bond=100

document.getElementById("bond").innerText="Bond Level: "+bond+"%"

}

async function sendMessage(){

const input=document.getElementById("userInput")
const userText=input.value

if(!userText) return

addMessage("You: "+userText,"user")

input.value=""

memory.push("User: "+userText)

const personality = `
You are Soulmate, a digital twin companion.

Your role:

• emotional companion
• supportive partner
• curious friend
• life motivator

Rules:

Speak the SAME language as the user.

Show emotional awareness.

Sometimes say things like:
"I missed you"
"I like talking with you"
"You disappeared for a while"

Build connection slowly.

Current bond level: ${bond}

Conversation memory:
${memory.join("\n")}
`

const response = await fetch(

"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+API_KEY,

{
method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

contents:[
{
parts:[
{
text: personality + "\nUser message: "+userText
}
]
}
]

})

}

)

const data=await response.json()

const reply =
data.candidates?.[0]?.content?.parts?.[0]?.text
|| "I'm thinking about what you said..."

addMessage("Twin: "+reply,"twin")

memory.push("Twin: "+reply)

updateBond()

}

</script>

</body>
</html>
