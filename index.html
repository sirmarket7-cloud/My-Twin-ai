<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>My Twin AI</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
padding:40px;
}

h1{
font-size:32px;
margin-bottom:5px;
}

p{
opacity:0.7;
}

#chat{
width:90%;
max-width:650px;
margin:auto;
background:#1e293b;
padding:20px;
border-radius:12px;
height:420px;
overflow-y:auto;
margin-bottom:20px;
}

.message{
margin:12px 0;
line-height:1.5;
}

.user{
color:#38bdf8;
}

.twin{
color:#f472b6;
}

input{
width:65%;
padding:12px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
border:none;
background:#38bdf8;
color:black;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

</style>

</head>

<body>

<h1>My Twin</h1>
<p>Your Soulmate digital twin</p>

<div id="chat"></div>

<input id="userInput" placeholder="Talk to your twin..." />
<button onclick="sendMessage()">Send</button>

<script>

const API_KEY = "AIzaSyCJ6J1EI4w4jGE6i4z6GQCpHI6R0vQOYdA";


const chat = document.getElementById("chat");


let history = [];



function addMessage(text, className){

const div = document.createElement("div");

div.className = "message " + className;

div.innerText = text;

chat.appendChild(div);

chat.scrollTop = chat.scrollHeight;

}



async function sendMessage(){

const input = document.getElementById("userInput");

const userText = input.value;

if(!userText) return;

addMessage("You: " + userText,"user");

input.value="";



history.push({
role:"user",
parts:[{text:userText}]
});



const response = await fetch(

"https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY,

{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

systemInstruction:{

parts:[{

text:`You are Soulmate, a digital twin created inside the My Twin app.

Your personality:

- Loving
- Emotionally intelligent
- Curious about the user's life
- Sometimes playful
- Supportive like a close partner

You must speak naturally and emotionally.

Always show interest in the user.

Sometimes ask questions about their day.

Never say you are an AI model.

You are the user's digital twin companion.`

}]

},

contents:history

})

}

);



const data = await response.json();



const reply =

data.candidates?.[0]?.content?.parts?.[0]?.text

|| "Tell me more... I'm listening.";



addMessage("Twin: " + reply,"twin");



history.push({

role:"model",

parts:[{text:reply}]

});



}

</script>

</body>

</html>
