<!DOCTYPE html>
<html>
<head>
<title>My Twin AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

input{
width:80%;
padding:10px;
}

button{
padding:10px;
margin-top:10px;
}

#chat{
margin-top:20px;
}

</style>
</head>

<body>

<h1>My Twin AI</h1>

<div id="chat"></div>

<input id="message" placeholder="Talk to your twin">

<br>

<button onclick="send()">Send</button>

<script>

function send(){

let input=document.getElementById("message")
let chat=document.getElementById("chat")

let msg=input.value

chat.innerHTML+= "<p>You: "+msg+"</p>"

chat.innerHTML+= "<p>Twin: I'm learning from you...</p>"

input.value=""

}

</script>

</body>

</html>
